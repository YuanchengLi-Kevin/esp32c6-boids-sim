tests:
  application.esp32c6_boids_sim:
    tags:
      - application
      - esp32c6
    platform_allow:
      - esp32c6_devkitc/esp32c6/hpcore
    harness: console
    harness_config:
      type: one_line
      regex:
        - "ESP32-C6 Boids Sim initialized"
